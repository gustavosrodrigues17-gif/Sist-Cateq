<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Crianças</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>Painel Administrativo</header>

<nav class="menu">
    <a href="/admin">🏠 Home</a>
    <a href="/criancas">👶 Crianças</a>
    <a href="/catequistas">👩 Catequistas</a>
    <a href="/turmas">📚 Turmas</a>
    <a href="/admins">🛡️ Admins</a>
    <a href="/relatorio">📊 Relatório</a>
    <a href="/deslogar">🚪 Sair</a>
</nav>

<div class="container">

    <div class="card">

        <h2>➕ Nova Criança</h2>

        <form action="/cadastrar_crianca" method="POST">

            <input type="text"
                   name="nome"
                   placeholder="Nome da criança"
                   required>

            <select name="turma_id" required>

                <option value="">Selecione a turma</option>

                {% for turma in turmas %}
                <option value="{{ turma[0] }}">
                    {{ turma[1] }}
                </option>
                {% endfor %}

            </select>

            <button type="submit">Cadastrar</button>

        </form>

    </div>

    <div class="card">

        <h2>👶 Crianças</h2>

        <input type="text"
               id="filtroNome"
               placeholder="Filtrar por nome">

        <select id="filtroTurma">

            <option value="">Todas as turmas</option>

            {% for turma in turmas %}
            <option value="{{ turma[1] }}">
                {{ turma[1] }}
            </option>
            {% endfor %}

        </select>

        <table id="tabelaCriancas">

            <tr>
                <th>Nome</th>
                <th>Turma</th>
                <th>Ações</th>
            </tr>

            {% for crianca in criancas %}
            <tr>

                <td>{{ crianca[1] }}</td>
                <td>{{ crianca[2] }}</td>

                <td>
                    <a href="/editar_crianca/{{ crianca[0] }}">✏️</a>

                    <a href="/excluir_crianca/{{ crianca[0] }}"
                       onclick="return confirm('Excluir criança?')">
                       ❌
                    </a>
                </td>

            </tr>
            {% endfor %}

        </table>

    </div>

</div>

<script>

const filtroNome = document.getElementById('filtroNome')
const filtroTurma = document.getElementById('filtroTurma')
const linhas = document.querySelectorAll('#tabelaCriancas tr')

function filtrar() {

    const nome = filtroNome.value.toLowerCase()
    const turma = filtroTurma.value.toLowerCase()

    linhas.forEach((linha, index) => {

        if(index === 0) return

        const nomeLinha = linha.children[0].innerText.toLowerCase()
        const turmaLinha = linha.children[1].innerText.toLowerCase()

        const mostrarNome = nomeLinha.includes(nome)
        const mostrarTurma = turmaLinha.includes(turma)

        linha.style.display =
            mostrarNome && mostrarTurma ? '' : 'none'
    })
}

filtroNome.addEventListener('keyup', filtrar)
filtroTurma.addEventListener('change', filtrar)

</script>

</body>
</html>
