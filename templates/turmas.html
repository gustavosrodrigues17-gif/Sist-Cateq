<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Turmas</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>Painel Administrativo</header>

<nav class="menu">
    <a href="/admin">🏠 Home</a>
    <a href="/criancas">👶 Crianças</a>
    <a href="/catequistas">👩 Catequistas</a>
    <a href="/turmas">📚 Turmas</a>
    <a href="/admins">🛡️ Admins</a>
    <a href="/relatorio">📊 Relatório</a>
    <a href="/deslogar">🚪 Sair</a>
</nav>

<div class="container">

    <div class="card">

        <h2>➕ Nova Turma</h2>

        <form action="/cadastrar_turma" method="POST">

            <input type="text"
                   name="nome"
                   placeholder="Nome da turma"
                   required>

            <select name="catequista_id"
                    multiple
                    size="5">

                {% for c in catequistas %}
                <option value="{{ c[0] }}">
                    {{ c[1] }}
                </option>
                {% endfor %}

            </select>

            <button type="submit">Cadastrar</button>

        </form>

    </div>

    <div class="card">

        <h2>📚 Turmas</h2>

        <table>

            <tr>
                <th>Nome</th>
                <th>Catequistas</th>
                <th>Ações</th>
            </tr>

            {% for t in turmas %}
            <tr>

                <td>{{ t[1] }}</td>

                <td>{{ t[2] }}</td>

                <td>

                    <a href="/visualizar_turma/{{ t[0] }}">
                        👁️
                    </a>

                    <a href="/editar_turma/{{ t[0] }}">
                        ✏️
                    </a>

                    <a href="/excluir_turma/{{ t[0] }}"
                       onclick="return confirm('Excluir turma?')">
                       ❌
                    </a>

                </td>

            </tr>
            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
