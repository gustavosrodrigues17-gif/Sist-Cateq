<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Paróquia São Lucas</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/style.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            padding:20px;

            font-family:'Segoe UI', sans-serif;

            background:
            linear-gradient(
                rgba(0,0,0,0.65),
                rgba(0,0,0,0.65)
            ),

            url('https://images.unsplash.com/photo-1507692049790-de58290a4334?q=80&w=1974&auto=format&fit=crop');

            background-size:cover;
            background-position:center;

            overflow:hidden;
        }

        /* LOGO AO FUNDO */

        .logo-bg{

            position:fixed;

            top:50%;
            left:50%;

            transform:translate(-50%,-50%);

            z-index:0;

            opacity:0.08;
        }

        .logo-bg img{

            width:500px;

            max-width:90vw;
        }

        header,
        .subtitulo,
        .container{

            position:relative;

            z-index:2;
        }

        header{

            background:none !important;

            box-shadow:none !important;

            color:white;

            font-size:42px;

            font-weight:700;

            text-align:center;

            margin-bottom:10px;
        }

        .subtitulo{

            color:rgba(255,255,255,0.85);

            margin-bottom:35px;

            font-size:17px;

            text-align:center;
        }

        .container{

            width:100%;
            max-width:420px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(14px);

            border:1px solid rgba(255,255,255,0.18);

            border-radius:30px;

            padding:40px;

            box-shadow:0 8px 40px rgba(0,0,0,0.35);

            animation:fade 0.7s ease;
        }

        @keyframes fade{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .container h2{

            color:white;

            text-align:center;

            margin-bottom:30px;

            font-size:30px;
        }

        form{

            display:flex;
            flex-direction:column;

            gap:18px;
        }

        input{

            padding:16px;

            border:none;

            border-radius:14px;

            background:rgba(255,255,255,0.92);

            color:#2c3e50;

            font-size:15px;

            outline:none;

            transition:0.3s;
        }

        input:focus{

            transform:scale(1.02);

            box-shadow:0 0 10px rgba(212,175,55,0.5);
        }

        input::placeholder{

            color:#7f8c8d;
        }

        button{

            padding:16px;

            border:none;

            border-radius:14px;

            background:#d4af37;

            color:white;

            font-size:16px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#c59d22;

            transform:translateY(-2px);
        }

        .erro{

            background:rgba(231,76,60,0.18);

            border:1px solid rgba(231,76,60,0.4);

            color:white;

            padding:14px;

            border-radius:14px;

            margin-bottom:20px;

            text-align:center;
        }

        @media(max-width:500px){

            header{
                font-size:30px;
            }

            .container{
                padding:30px 25px;
            }

            .container h2{
                font-size:25px;
            }

        }

    </style>

</head>

<body>

<!-- LOGO TRANSPARENTE AO FUNDO -->
<div class="logo-bg">

    <img src="/static/logo.png">

</div>

<header>
    ✨ Paróquia São Lucas
</header>

<div class="subtitulo">
    Sistema de Catequese
</div>

<div class="container">

    <h2>Login</h2>

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            <div class="erro">

                {{ messages[0] }}

            </div>

        {% endif %}

    {% endwith %}

    <form action="/autenticar" method="POST">

        <input
            type="email"
            name="email"
            placeholder="Digite seu email"
            required
        >

        <input
            type="password"
            name="senha"
            placeholder="Digite sua senha"
            required
        >

        <button type="submit">
            Entrar no Sistema
        </button>

    </form>

</div>

</body>

</html>
