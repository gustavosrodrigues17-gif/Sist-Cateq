<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Editar Chamada</title>

    <link rel="stylesheet" href="/static/style.css">

    <!-- FLATPICKR -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>
    ✏️ Editar Chamada
</header>

<nav>

    <a href="/catequista">⬅ Voltar</a>

    <a href="/deslogar">🚪 Sair</a>

</nav>

<div class="container">

    <!-- BUSCAR CHAMADA -->
    <div class="card">

        <h2>🔎 Buscar Chamada</h2>

        <form method="POST">

            <label>Data da chamada:</label>

            <input
                type="text"
                name="data"
                id="data"
                required
                value="{{ data if data else '' }}"
                placeholder="Selecione um dia"
            >

            <label>Turma:</label>

            <select name="turma_id" required>

                {% for t in turmas %}

                <option
                    value="{{t[0]}}"

                    {% if turma_id and turma_id|string == t[0]|string %}
                    selected
                    {% endif %}
                >
                    {{t[1]}}
                </option>

                {% endfor %}

            </select>

            <button type="submit">
                🔎 Buscar
            </button>

        </form>

    </div>

    <!-- RESULTADOS -->
    {% if registros %}

    <div class="card">

        <h2>📋 Editar Presenças</h2>

        <form method="POST">

            <!-- MANTER DATA E TURMA -->
            <input
                type="hidden"
                name="data"
                value="{{ data }}"
            >

            <input
                type="hidden"
                name="turma_id"
                value="{{ turma_id }}"
            >

            {% for r in registros %}

            <div
                class="card"
                style="
                    margin-bottom:20px;
                    border-left:5px solid #c59d5f;
                "
            >

                <h3>{{ r[1] }}</h3>

                <label>Status:</label>

                <select name="status_{{r[0]}}">

                    <option
                        value="Presente"
                        {% if r[2] == 'Presente' %}
                        selected
                        {% endif %}
                    >
                        ✅ Presente
                    </option>

                    <option
                        value="Falta"
                        {% if r[2] == 'Falta' %}
                        selected
                        {% endif %}
                    >
                        ❌ Falta
                    </option>

                </select>

                <label>Justificativa:</label>

                <input
                    type="text"
                    name="justificativa_{{r[0]}}"
                    value="{{r[3] if r[3] else ''}}"
                    placeholder="Digite uma justificativa..."
                >

            </div>

            {% endfor %}

            <input
                type="hidden"
                name="salvar"
                value="1"
            >

            <div
                style="
                    display:flex;
                    gap:15px;
                    margin-top:20px;
                    flex-wrap:wrap;
                "
            >

                <button type="submit">
                    💾 Salvar Alterações
                </button>

                <button
                    type="submit"
                    name="excluir_chamada"
                    value="1"
                    style="
                        background:#c0392b;
                    "
                    onclick="return confirm('Deseja realmente excluir essa chamada?')"
                >
                    🗑 Excluir Chamada
                </button>

            </div>

        </form>

    </div>

    {% endif %}

</div>

<script>

    let datasChamadas = {{ datas_chamadas|tojson }}

    flatpickr("#data", {

        dateFormat: "Y-m-d",

        enable: datasChamadas,

        locale: "pt"

    })

</script>

</body>
</html>
