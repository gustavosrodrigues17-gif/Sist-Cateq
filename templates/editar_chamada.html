<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Editar Chamada</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<header>
    Editar Chamada
</header>

<nav>

    <a href="/catequista">Voltar</a>

    <a href="/deslogar">Sair</a>

</nav>

<div class="container">

    <div class="card">

        <h2>Buscar Chamada</h2>

        <form method="POST">

            <label>Data:</label>

            <input
                type="date"
                name="data"
                required
            >

            <label>Turma:</label>

            <select name="turma_id" required>

                {% for t in turmas %}

                <option value="{{t[0]}}">
                    {{t[1]}}
                </option>

                {% endfor %}

            </select>

            <button type="submit">
                Buscar
            </button>

        </form>

    </div>

    {% if registros %}

    <div class="card">

        <h2>Editar Presenças</h2>

        <form method="POST">

            {% for r in registros %}

            <div class="card" style="margin-bottom:20px;">

                <h3>{{ r[1] }}</h3>

                <input
                    type="hidden"
                    name="status_id"
                    value="{{r[0]}}"
                >

                <label>Status:</label>

                <select name="status_{{r[0]}}">

                    <option
                        value="Presente"
                        {% if r[2] == 'Presente' %}
                        selected
                        {% endif %}
                    >
                        Presente
                    </option>

                    <option
                        value="Falta"
                        {% if r[2] == 'Falta' %}
                        selected
                        {% endif %}
                    >
                        Falta
                    </option>

                </select>

                <label>Justificativa:</label>

                <input
                    type="text"
                    name="justificativa_{{r[0]}}"
                    value="{{r[3] if r[3] else ''}}"
                >

            </div>

            {% endfor %}

            <input type="hidden" name="salvar" value="1">

            <button type="submit">
                💾 Salvar Alterações
            </button>

        </form>

    </div>

    {% endif %}

</div>

</body>
</html>
